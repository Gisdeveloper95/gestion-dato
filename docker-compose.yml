name: gestion_dato

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: gestion_db
    labels:
      - "com.proyecto=gestion_dato"
      - "com.servicio=postgres"
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gestion_dato_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Gestion2025Pruebas!}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - igac_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-gestion_dato_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend Django
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gestion_dato/backend:latest
    container_name: gestion_dato_backend
    labels:
      - "com.proyecto=gestion_dato"
      - "com.servicio=backend"
    restart: unless-stopped
    privileged: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Django settings
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-this-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,gestiondato.duckdns.org}

      # Database settings - conecta al servicio db
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-gestion_dato_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Gestion2025Pruebas!}
      DB_HOST: db
      DB_PORT: 5432
      DB_CLIENT_ENCODING: UTF8

      # CORS settings
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:80,http://localhost:5173,https://gestiondato.duckdns.org}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:80,http://localhost:5173,https://gestiondato.duckdns.org}

      # JWT settings
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-180}
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: ${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-1}

      # Network shares
      REPOSITORY_BASE_PATH: ${REPOSITORY_BASE_PATH:-/mnt/repositorio}
      PDF_REPOSITORY_PATH: ${PDF_REPOSITORY_PATH:-/mnt/repositorio}
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - backend_backups:/app/backups
      - /mnt/repositorio:/mnt/repositorio:rw
    networks:
      - igac_network
    # Healthcheck deshabilitado - usar docker logs para verificar estado
    healthcheck:
      disable: true

  # Frontend Vue (Producción)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    image: gestion_dato/frontend:latest
    container_name: gestion_dato_frontend
    labels:
      - "com.proyecto=gestion_dato"
      - "com.servicio=frontend"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - igac_network
    environment:
      VITE_API_URL: ${VITE_API_URL:-}

  # NOTA: Nginx se maneja desde server_archivo para ambos dominios
  # gestiondato.duckdns.org y gestionarchivo.duckdns.org comparten el mismo nginx
  # Ver: /home/andres/server_archivo/nginx/conf.d/gestiondato.conf

volumes:
  postgres_data:
    driver: local
  backend_static:
    driver: local
  backend_media:
    driver: local
  backend_backups:
    driver: local

networks:
  igac_network:
    driver: bridge
