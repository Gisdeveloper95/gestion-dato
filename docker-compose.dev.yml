# Configuración para desarrollo con hot-reload
services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: igac_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gestion_dato_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./bd_backup:/backups
    ports:
      - "5432:5432"
    networks:
      - igac_network_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Django en modo desarrollo
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: igac_backend_dev
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key}
      ALLOWED_HOSTS: "*"

      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-gestion_dato_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-1234}
      DB_HOST: db
      DB_PORT: 5432
      DB_CLIENT_ENCODING: UTF8

      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:80"
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://localhost:80"

      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: 180
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: 1
    volumes:
      - ./backend:/app
      - backend_static_dev:/app/staticfiles
      - backend_media_dev:/app/media
      - backend_backups_dev:/app/backups
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - igac_network_dev

  # Frontend Vue con hot-reload
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: igac_frontend_dev
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - igac_network_dev
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_SERVER_HOST: 0.0.0.0
      VITE_SERVER_PORT: 5173

volumes:
  postgres_data_dev:
    driver: local
  backend_static_dev:
    driver: local
  backend_media_dev:
    driver: local
  backend_backups_dev:
    driver: local

networks:
  igac_network_dev:
    driver: bridge
